<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa de Agencias — Caruso Seguros</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --purple:   #4F408E;
  --teal:     #31B0CD;
  --lilac:    #9A6EED;
  --green:    #38BB9D;
  --purple-light: rgba(79,64,142,0.25);
  --teal-light:   rgba(49,176,205,0.25);
  --bg:      #0d0f18;
  --surface: #131620;
  --surface2:#1a1d2e;
  --border:  rgba(255,255,255,0.07);
  --text:    #e8eaf2;
  --muted:   #7a7f96;
  --font:    'DM Sans', sans-serif;
  --mono:    'DM Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); }

/* HEADER */
header {
  height: 58px;
  padding: 0 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
  position: relative;
  z-index: 1000;
  flex-shrink: 0;
}
.header-logo img {
  height: 36px;
  width: auto;
  display: block;
}
.header-divider {
  width: 1px;
  height: 28px;
  background: var(--border);
  flex-shrink: 0;
}
.header-title h1 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  letter-spacing: -0.2px;
}
.header-title p {
  font-size: 11px;
  color: var(--muted);
  font-family: var(--mono);
  margin-top: 1px;
}
.header-spacer { flex: 1; }
.legend {
  display: flex;
  gap: 14px;
  align-items: center;
}
.leg-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--muted);
}
.leg-dot {
  width: 9px; height: 9px; border-radius: 50%;
  flex-shrink: 0;
}
.leg-sq {
  width: 9px; height: 9px; border-radius: 2px;
  flex-shrink: 0;
}
.stats {
  display: flex;
  gap: 8px;
  margin-left: 8px;
}
.stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 4px 12px;
  text-align: center;
}
.stat-num {
  font-size: 16px;
  font-weight: 600;
  font-family: var(--mono);
}
.stat-label {
  font-size: 9px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* LAYOUT */
.app {
  display: flex;
  height: calc(100vh - 58px);
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 320px;
  flex-shrink: 0;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.sidebar-top {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.search-wrap { position: relative; }
.search-wrap input {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  padding: 7px 10px 7px 30px;
  font-size: 12px;
  font-family: var(--font);
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}
.search-wrap input:focus { border-color: var(--teal); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon {
  position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
  color: var(--muted); font-size: 12px; pointer-events: none;
}
.filter-row { display: flex; gap: 5px; }
.filter-btn {
  flex: 1;
  padding: 5px 6px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-family: var(--font);
  cursor: pointer;
  transition: all 0.15s;
}
.filter-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
.filter-btn.f-all   { background: var(--surface2); border-color: rgba(255,255,255,0.15); color: var(--text); }
.filter-btn.f-cba   { background: var(--purple-light); border-color: var(--purple); color: #9A6EED; }
.filter-btn.f-salta { background: var(--teal-light);   border-color: var(--teal);   color: #31B0CD; }

.agencies-list {
  flex: 1;
  overflow-y: auto;
  padding: 4px 0;
}
.agencies-list::-webkit-scrollbar { width: 3px; }
.agencies-list::-webkit-scrollbar-track { background: transparent; }
.agencies-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.ag-item {
  padding: 9px 12px;
  cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  display: flex;
  align-items: center;
  gap: 9px;
  transition: background 0.12s;
}
.ag-item:hover { background: var(--surface2); }
.ag-item.selected { background: rgba(49,176,205,0.08); border-left: 2px solid var(--teal); padding-left: 10px; }
.ag-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.ag-dot.capital { border-radius: 2px; }
.ag-info { flex: 1; min-width: 0; }
.ag-name {
  font-size: 12px; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  color: var(--text);
}
.ag-sub {
  font-size: 10px; color: var(--muted);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  margin-top: 1px;
}
.ag-badge {
  font-size: 10px; font-family: var(--mono);
  padding: 2px 6px; border-radius: 4px; flex-shrink: 0; font-weight: 500;
}
.b-cba   { background: var(--purple-light); color: #9A6EED; }
.b-salta { background: var(--teal-light);   color: #31B0CD; }
.no-results { padding: 28px 12px; text-align: center; color: var(--muted); font-size: 12px; }

/* MAP */
#map-wrap {
  flex: 1;
  position: relative;
}
#map {
  width: 100%;
  height: 100%;
}

/* LEAFLET OVERRIDES */
.leaflet-container { background: #0d0f18 !important; font-family: var(--font) !important; }
.leaflet-popup-content-wrapper {
  background: var(--surface) !important;
  border: 1px solid rgba(49,176,205,0.3) !important;
  border-radius: 10px !important;
  box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 0 1px rgba(49,176,205,0.1) !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
  padding: 0 !important;
}
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 0 !important; width: auto !important; min-width: 220px; }
.leaflet-control-zoom a {
  background: var(--surface) !important;
  border-color: var(--border) !important;
  color: var(--text) !important;
  font-family: var(--font) !important;
}
.leaflet-control-zoom a:hover { background: var(--surface2) !important; color: var(--teal) !important; }
.leaflet-control-attribution {
  background: rgba(13,15,24,0.8) !important;
  color: var(--muted) !important;
  font-size: 9px !important;
}
.leaflet-control-attribution a { color: var(--teal) !important; }

/* POPUP */
.pu { padding: 14px 16px; }
.pu-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.pu-prov { font-size: 10px; color: var(--teal); font-family: var(--mono); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.pu-addr { font-size: 11px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.pu-sep { height: 1px; background: var(--border); margin-bottom: 10px; }
.pu-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
.pu-label { font-size: 11px; color: var(--muted); }
.pu-val { font-size: 12px; font-family: var(--mono); font-weight: 500; }
.pu-winner {
  margin-top: 10px; padding: 6px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 500; text-align: center;
}
.pw-cba    { background: var(--purple-light); color: #9A6EED; }
.pw-salta  { background: var(--teal-light);   color: #31B0CD; }
.pw-cap    { background: rgba(56,187,157,0.2); color: #38BB9D; }
</style>
</head>

// Colors
const C_CBA   = '#9A6EED';
const C_SALTA = '#31B0CD';
const C_CAP   = '#38BB9D';

let currentFilter = 'all';
let selectedIdx   = null;

// MAP — init without center, fitBounds will handle it
const map = L.map('map', {
  zoomControl: true,
  preferCanvas: true,
});

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  subdomains: 'abcd',
  maxZoom: 19,
}).addTo(map);

function makeIcon(ag) {
  const c = ag.esCapital ? C_CAP : (ag.destino === 'CORDOBA' ? C_CBA : C_SALTA);
  const glow = ag.esCapital ? 'rgba(56,187,157,0.5)' : (ag.destino === 'CORDOBA' ? 'rgba(154,110,237,0.5)' : 'rgba(49,176,205,0.5)');
  const shape = ag.esCapital
    ? `<rect x="1" y="1" width="14" height="14" rx="3" fill="${c}" stroke="rgba(255,255,255,0.6)" stroke-width="1.5"/>`
    : `<circle cx="8" cy="8" r="6" fill="${c}" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>`;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" style="filter:drop-shadow(0 0 5px ${glow})">${shape}</svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [16,16], iconAnchor: [8,8], popupAnchor: [0,-12] });
}

function winnerHTML(ag) {
  if (ag.esCapital) return '<div class="pu-winner pw-cap">🏢 Agencia Capital</div>';
  if (ag.dCba < ag.dSalta) return '<div class="pu-winner pw-cba">✓ Más cerca de Córdoba</div>';
  if (ag.dSalta < ag.dCba) return '<div class="pu-winner pw-salta">✓ Más cerca de Salta</div>';
  return '<div class="pu-winner pw-cap">= Igual distancia</div>';
}

// Create markers
const markers = AGENCIAS.map((ag, i) => {
  const m = L.marker([ag.lat, ag.lng], { icon: makeIcon(ag) }).addTo(map);
  m.bindPopup(`
    <div class="pu">
      <div class="pu-title">${ag.nombre}</div>
      <div class="pu-prov">${ag.prov}</div>
      <div class="pu-addr">📍 ${ag.dir}</div>
      <div class="pu-sep"></div>
      <div class="pu-row">
        <span class="pu-label">→ Córdoba Capital</span>
        <span class="pu-val" style="color:#9A6EED">${ag.dCba.toLocaleString('es-AR')} km</span>
      </div>
      <div class="pu-row">
        <span class="pu-label">→ Salta Capital</span>
        <span class="pu-val" style="color:#31B0CD">${ag.dSalta.toLocaleString('es-AR')} km</span>
      </div>
      ${winnerHTML(ag)}
    </div>
  `, { maxWidth: 260, autoPan: false });

  // Click on marker: highlight list item + open popup, NO map movement
  m.on('click', () => {
    selectItem(i, false);
  });

  return { marker: m, el: null };
});

// Prevent ANY map movement when popups open
map.on('popupopen', function(e) {
  // do nothing - no pan
});
map.options.markerZoomAnimation = false;

// Fit bounds to show all Argentina agencies
const allLatLngs = AGENCIAS.map(a => [a.lat, a.lng]);
map.fitBounds(L.latLngBounds(allLatLngs), { padding: [40, 40], maxZoom: 7 });

// STATS
document.getElementById('st-cba').textContent   = AGENCIAS.filter(a=>a.destino==='CORDOBA'&&!a.esCapital).length;
document.getElementById('st-salta').textContent = AGENCIAS.filter(a=>a.destino==='SALTA'&&!a.esCapital).length;

// LIST
function renderList() {
  const search = document.getElementById('search').value.toLowerCase();
  const list   = document.getElementById('list');
  list.innerHTML = '';
  let count = 0;
  AGENCIAS.forEach((ag, i) => {
    const matchF = currentFilter === 'all' || ag.destino === currentFilter;
    const matchS = ag.nombre.toLowerCase().includes(search) || ag.prov.toLowerCase().includes(search);
    markers[i].el = null;
    if (!matchF || !matchS) return;
    count++;
    const div = document.createElement('div');
    div.className = 'ag-item' + (selectedIdx === i ? ' selected' : '');
    const dotColor = ag.esCapital ? C_CAP : (ag.destino==='CORDOBA' ? C_CBA : C_SALTA);
    const dotClass = ag.esCapital ? 'ag-dot capital' : 'ag-dot';
    div.innerHTML = `
      <div class="${dotClass}" style="background:${dotColor}"></div>
      <div class="ag-info">
        <div class="ag-name">${ag.nombre}</div>
        <div class="ag-sub">${ag.prov} · ${ag.dCba} km Cba · ${ag.dSalta} km Salta</div>
      </div>
      <span class="ag-badge ${ag.destino==='CORDOBA'?'b-cba':'b-salta'}">${ag.destino==='CORDOBA'?'→ Cba':'→ Salta'}</span>
    `;
    div.addEventListener('click', () => selectItem(i, true));
    markers[i].el = div;
    list.appendChild(div);
  });
  if (count === 0) list.innerHTML = '<div class="no-results">Sin resultados</div>';
  document.getElementById('st-total').textContent = count;
}

function selectItem(i, fromList) {
  // Clear previous selection
  if (selectedIdx !== null && markers[selectedIdx].el) {
    markers[selectedIdx].el.classList.remove('selected');
  }
  selectedIdx = i;

  // Highlight list item
  if (markers[i].el) {
    markers[i].el.classList.add('selected');
    markers[i].el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Open popup - autoPan is disabled on popup, so map stays still
  markers[i].marker.openPopup();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.className = 'filter-btn';
  });
  btn.classList.add(f==='all'?'f-all':f==='CORDOBA'?'f-cba':'f-salta');
  renderList();
}

renderList();
</script>
